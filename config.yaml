# APEX+ simulator configuration.
# Loaded automatically from config.yaml in the working dir, or via --config <path>.

# Communication energy parameters (pJ/bit).
#
# Intra-node NVLink (<=8 GPUs/node, short PCB traces):
#   Wei et al., "NVLink-C2C," ISSCC 2023, Paper 9.3 — 1.3 pJ/bit.
#   Poulton et al., IEEE JSSC vol. 54, 2019 (1.17 pJ/bit GRS SerDes).
# Rack-scale NVLink (>8 GPUs/node, NVL72 copper cables through NVSwitch trays):
#   ~5 pJ/bit — estimated from 112G PAM4 SerDes class, similar to PCIe Gen5
#   (NVIDIA implies PCIe Gen5 ~6.5 pJ/bit via "5x more efficient" C2C claim).
# IB full path (~70 pJ/bit):
#   NIC ~30 pJ/bit (NVIDIA CX-7 VPI: ~12W @ 400Gbps);
#   Optics ~25 pJ/bit (QSFP-DD MSA, 10-12W @ 400Gbps; Minkenberg et al. 2021);
#   Switch ~12 pJ/bit (Quantum-2 QM9790: 640W / 51.2Tbps; Chen et al., ISCA 2024).
energy:
  nvlink_intra_node_pj_per_bit: 1.3    # <=8 GPUs/node (DGX-internal)
  nvlink_rack_scale_pj_per_bit: 5.0    # >8 GPUs/node (NVL72 copper cables)
  ib_pj_per_bit: 70.0                  # Full IB path (NIC + optics + switch)
  rack_scale_threshold: 8              # GPUs/node boundary for intra/rack split

# Spectra (OCS) scheduling parameters. Consumed when --interconnect spectra is set.
#
# Physical model (Lin et al., panel-scale glass design, Apr 2026):
#   - Each GPU has `wgs_per_gpu` bidirectional waveguides.
#   - Each waveguide carries `wg_speed_gbps` Gbps (gigabits/sec).
#   - Waveguides are distributed across `num_planes` parallel OCS planes; in the
#     baseline design wgs_per_gpu == num_planes (one waveguide per plane per GPU).
#   - Per-port bandwidth (used by the solver) = wg_speed_gbps / 8 GB/s.
#
# Defaults match the design point: 8 planes × 1024 Gbps per waveguide → 128 GB/s
# per port, ≈ 1 TB/s aggregate per-GPU egress (close to the 0.9 TB/s TX target).
spectra:
  num_planes: 8              # s — number of parallel OCS planes (8 for powers-of-2 plot)
  wgs_per_gpu: 8             # bidirectional waveguides per GPU (= num_planes in baseline design)
  wg_speed_gbps: 1024.0      # per-waveguide line rate in Gbps (~1.029 Tb/s in design)
  reconfig_delay_us: 10.0    # delta in µs — heater-case OCS reconfiguration delay
  # TODO(spectra-energy): pj_per_bit for optical fabric is deferred — energy currently returns 0 for spectra mode
